<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#4AABE0">
    <meta name="description" content="Anaokulu seviyesinde eğlenceli ve eğitici oyunlar - Oyun Bahçesi">
    <title>Oyun Bahçesi - Eğitici Çocuk Oyunları</title>
    <link rel="manifest" href="manifest.json">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/main.css">
    <link rel="stylesheet" href="css/animations.css">
    <link rel="stylesheet" href="css/hub.css">
    <link rel="stylesheet" href="css/multiplayer.css">
    <link rel="stylesheet" href="css/games.css">
    <link rel="stylesheet" href="css/kod-macerasi.css">
    <link rel="stylesheet" href="css/satranc.css">
    <link rel="stylesheet" href="css/penalti.css">
    <link rel="stylesheet" href="css/lego-world.css">
    <link rel="stylesheet" href="css/tuval.css">
    <link rel="stylesheet" href="css/responsive.css">
    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-database-compat.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>
</head>
<body>
    <!-- Başlangıç Splash Ekranı -->
    <div id="splash-screen" class="splash-screen">
        <div class="splash-content">
            <div class="splash-sun"></div>
            <h1 class="splash-title">Oyun Bahçesi</h1>
            <p class="splash-subtitle">Öğrenmeye Hazır Mısın?</p>
            <button id="splash-start" class="splash-btn">Oynamaya Başla!</button>
        </div>
        <div class="splash-clouds">
            <div class="cloud cloud-1"></div>
            <div class="cloud cloud-2"></div>
            <div class="cloud cloud-3"></div>
        </div>
        <div class="splash-ground"></div>
    </div>

    <!-- Ana Uygulama -->
    <div id="app" class="app hidden">
        <!-- Üst Bar -->
        <header id="top-bar" class="top-bar">
            <button id="btn-home" class="top-btn home-btn" title="Ana Sayfa" aria-label="Ana sayfa">
                <svg viewBox="0 0 24 24" fill="currentColor"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg>
            </button>
            <h1 class="top-title">Oyun Bahçesi</h1>
            <div class="top-right">
                <div class="star-counter" id="star-counter">
                    <svg class="star-icon" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>
                    <span id="total-stars">0</span>
                </div>
                <button id="btn-sound" class="top-btn sound-btn" title="Ses" aria-label="Ses aç/kapa">
                    <svg class="sound-on" viewBox="0 0 24 24" fill="currentColor"><path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z"/></svg>
                    <svg class="sound-off hidden" viewBox="0 0 24 24" fill="currentColor"><path d="M16.5 12c0-1.77-1.02-3.29-2.5-4.03v2.21l2.45 2.45c.03-.2.05-.41.05-.63zm2.5 0c0 .94-.2 1.82-.54 2.64l1.51 1.51C20.63 14.91 21 13.5 21 12c0-4.28-2.99-7.86-7-8.77v2.06c2.89.86 5 3.54 5 6.71zM4.27 3L3 4.27 7.73 9H3v6h4l5 5v-6.73l4.25 4.25c-.67.52-1.42.93-2.25 1.18v2.06c1.38-.31 2.63-.95 3.69-1.81L19.73 21 21 19.73l-9-9L4.27 3zM12 4L9.91 6.09 12 8.18V4z"/></svg>
                </button>
                <button id="btn-settings" class="top-btn settings-btn" title="Ayarlar" aria-label="Ebeveyn ayarları">
                    <svg viewBox="0 0 24 24" fill="currentColor"><path d="M19.14 12.94c.04-.3.06-.61.06-.94 0-.32-.02-.64-.07-.94l2.03-1.58c.18-.14.23-.41.12-.61l-1.92-3.32c-.12-.22-.37-.29-.59-.22l-2.39.96c-.5-.38-1.03-.7-1.62-.94l-.36-2.54c-.04-.24-.24-.41-.48-.41h-3.84c-.24 0-.43.17-.47.41l-.36 2.54c-.59.24-1.13.57-1.62.94l-2.39-.96c-.22-.08-.47 0-.59.22L2.74 8.87c-.12.21-.08.47.12.61l2.03 1.58c-.05.3-.07.62-.07.94s.02.64.07.94l-2.03 1.58c-.18.14-.23.41-.12.61l1.92 3.32c.12.22.37.29.59.22l2.39-.96c.5.38 1.03.7 1.62.94l.36 2.54c.05.24.24.41.48.41h3.84c.24 0 .44-.17.47-.41l.36-2.54c.59-.24 1.13-.56 1.62-.94l2.39.96c.22.08.47 0 .59-.22l1.92-3.32c.12-.22.07-.47-.12-.61l-2.01-1.58zM12 15.6c-1.98 0-3.6-1.62-3.6-3.6s1.62-3.6 3.6-3.6 3.6 1.62 3.6 3.6-1.62 3.6-3.6 3.6z"/></svg>
                </button>
            </div>
        </header>

        <!-- Kategori Navigasyonu -->
        <nav id="hub-nav" class="hub-nav">
            <div class="hub-nav-scroll" id="hub-nav-scroll">
                <!-- JS ile render edilecek -->
            </div>
        </nav>

        <!-- Hub / Oyun Seçim Ekranı -->
        <main id="hub" class="hub">
            <div class="hub-bg">
                <div class="sky"></div>
                <div class="cloud cloud-1"></div>
                <div class="cloud cloud-2"></div>
                <div class="cloud cloud-3"></div>
                <div class="cloud cloud-4"></div>
                <div class="sun"></div>
                <div class="hills"></div>
                <div class="grass"></div>
            </div>
            <!-- Popüler Oyunlar -->
            <div class="hub-popular" id="hub-popular"></div>
            <div class="hub-grid" id="hub-grid">
                <!-- Oyun kartları JS ile render edilecek -->
            </div>
        </main>

        <!-- Oyun Container -->
        <div id="game-container" class="game-container hidden">
            <div id="game-toolbar" class="game-toolbar">
                <button id="game-home" class="toolbar-btn" aria-label="Ana sayfa">
                    <svg viewBox="0 0 24 24" fill="currentColor"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg>
                </button>
                <div class="toolbar-info">
                    <span id="game-title" class="toolbar-title"></span>
                    <div class="toolbar-level" id="toolbar-level"></div>
                </div>
                <div class="toolbar-stars" id="toolbar-stars">
                    <svg class="toolbar-star" viewBox="0 0 24 24"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>
                    <svg class="toolbar-star" viewBox="0 0 24 24"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>
                    <svg class="toolbar-star" viewBox="0 0 24 24"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>
                </div>
            </div>
            <div id="game-area" class="game-area"></div>
        </div>

        <!-- Seviye Tamamlama Overlay -->
        <div id="level-complete" class="level-complete hidden">
            <div class="complete-card">
                <h2 class="complete-title" id="complete-title">Aferin!</h2>
                <div class="complete-stars" id="complete-stars"></div>
                <div class="complete-buttons">
                    <button id="btn-replay" class="complete-btn replay-btn">Tekrar Oyna</button>
                    <button id="btn-next" class="complete-btn next-btn">Sonraki Seviye</button>
                    <button id="btn-hub" class="complete-btn hub-btn">Oyunlar</button>
                </div>
            </div>
        </div>

        <!-- Konfeti Canvas -->
        <canvas id="particles-canvas" class="particles-canvas"></canvas>
    </div>

    <script src="js/firebase-config.js"></script>
    <script src="js/i18n.js"></script>
    <script src="js/audio.js"></script>
    <script src="js/progress.js"></script>
    <script src="js/particles.js"></script>
    <script src="js/drag.js"></script>
    <script src="js/engine.js"></script>
    <script src="js/multiplayer.js"></script>
    <script src="js/lobby.js"></script>
    <script src="js/games/hafiza-kartlari.js"></script>
    <script src="js/games/renk-eslestirme.js"></script>
    <script src="js/games/sayi-sayma.js"></script>
    <script src="js/games/harf-tanima.js"></script>
    <script src="js/games/sekil-bulmaca.js"></script>
    <script src="js/games/boyama.js"></script>
    <script src="js/games/siralama.js"></script>
    <script src="js/games/kelime-tahmin.js"></script>
    <script src="js/games/harf-tahmin.js"></script>
    <script src="js/games/kod-macerasi-shared.js"></script>
    <script src="js/games/kod-macerasi.js"></script>
    <script src="js/games/kod-macerasi-mp.js"></script>
    <script src="js/games/satranc-engine.js"></script>
    <script src="js/games/satranc.js"></script>
    <script src="js/games/satranc-mp.js"></script>
    <script src="js/games/matematik.js"></script>
    <script src="js/games/hece-birlestirme.js"></script>
    <script src="js/games/jigsaw.js"></script>
    <script src="js/games/desen.js"></script>
    <script src="js/games/lego-macerasi.js"></script>
    <script src="js/games/lego-world.js"></script>
    <script src="js/games/penalti.js"></script>
    <script src="js/games/penalti-mp.js"></script>
    <script src="js/games/tuval.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
