<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#44E88E"/>
      <stop offset="100%" stop-color="#26DE81"/>
    </linearGradient>
  </defs>
  <rect width="128" height="128" rx="28" fill="url(#bg)"/>
  <!-- Sorting bars (small to big) -->
  <rect x="20" y="82" width="18" height="24" rx="6" fill="white" opacity="0.95"/>
  <rect x="44" y="62" width="18" height="44" rx="6" fill="white" opacity="0.95"/>
  <rect x="68" y="42" width="18" height="64" rx="6" fill="white" opacity="0.95"/>
  <rect x="92" y="22" width="18" height="84" rx="6" fill="white" opacity="0.95"/>
  <!-- Arrow showing direction -->
  <line x1="24" y1="34" x2="100" y2="34" stroke="white" stroke-width="3" stroke-linecap="round" opacity="0.6"/>
  <polygon points="100,28 112,34 100,40" fill="white" opacity="0.6"/>
  <!-- Numbers on bars -->
  <text x="29" y="100" text-anchor="middle" font-family="sans-serif" font-weight="bold" font-size="13" fill="#26DE81">1</text>
  <text x="53" y="100" text-anchor="middle" font-family="sans-serif" font-weight="bold" font-size="13" fill="#26DE81">2</text>
  <text x="77" y="100" text-anchor="middle" font-family="sans-serif" font-weight="bold" font-size="13" fill="#26DE81">3</text>
  <text x="101" y="100" text-anchor="middle" font-family="sans-serif" font-weight="bold" font-size="13" fill="#26DE81">4</text>
</svg>
