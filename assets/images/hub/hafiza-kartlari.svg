<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#C39BF2"/>
      <stop offset="100%" stop-color="#A55EEA"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-opacity="0.15"/>
    </filter>
  </defs>
  <rect width="128" height="128" rx="28" fill="url(#bg)"/>
  <!-- Card 1 - face down -->
  <rect x="18" y="22" width="40" height="52" rx="8" fill="white" opacity="0.95" filter="url(#shadow)"/>
  <text x="38" y="55" text-anchor="middle" font-size="26" fill="#A55EEA">?</text>
  <!-- Card 2 - face up with star -->
  <rect x="70" y="22" width="40" height="52" rx="8" fill="white" opacity="0.95" filter="url(#shadow)"/>
  <text x="90" y="55" text-anchor="middle" font-size="24">⭐</text>
  <!-- Card 3 - face down -->
  <rect x="18" y="58" width="40" height="52" rx="8" fill="white" opacity="0.85" filter="url(#shadow)" transform="translate(0,6)"/>
  <text x="38" y="97" text-anchor="middle" font-size="26" fill="#A55EEA">?</text>
  <!-- Card 4 - face up with star -->
  <rect x="70" y="58" width="40" height="52" rx="8" fill="white" opacity="0.85" filter="url(#shadow)" transform="translate(0,6)"/>
  <text x="90" y="97" text-anchor="middle" font-size="24">⭐</text>
</svg>
