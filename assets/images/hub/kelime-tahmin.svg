<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FF7B6B"/>
      <stop offset="100%" stop-color="#FF6348"/>
    </linearGradient>
  </defs>
  <rect width="128" height="128" rx="28" fill="url(#bg)"/>
  <!-- Word grid cells -->
  <rect x="16" y="32" width="28" height="28" rx="6" fill="#2ECC71" opacity="0.95"/>
  <text x="30" y="52" text-anchor="middle" font-family="sans-serif" font-weight="bold" font-size="18" fill="white">K</text>
  <rect x="50" y="32" width="28" height="28" rx="6" fill="#E74C3C" opacity="0.95"/>
  <text x="64" y="52" text-anchor="middle" font-family="sans-serif" font-weight="bold" font-size="18" fill="white">E</text>
  <rect x="84" y="32" width="28" height="28" rx="6" fill="#2ECC71" opacity="0.95"/>
  <text x="98" y="52" text-anchor="middle" font-family="sans-serif" font-weight="bold" font-size="18" fill="white">L</text>
  <!-- Second row -->
  <rect x="16" y="66" width="28" height="28" rx="6" fill="white" opacity="0.4"/>
  <rect x="50" y="66" width="28" height="28" rx="6" fill="white" opacity="0.4"/>
  <rect x="84" y="66" width="28" height="28" rx="6" fill="white" opacity="0.4"/>
  <!-- VS badge -->
  <circle cx="64" cy="108" r="12" fill="white" opacity="0.9"/>
  <text x="64" y="113" text-anchor="middle" font-family="sans-serif" font-weight="900" font-size="12" fill="#FF6348">VS</text>
